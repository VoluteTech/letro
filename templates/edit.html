<div class="bg-white p-3 rounded-lg shadow-sm border border-gray-300 space-y-2">
  <form hx-put="/cards/{{.Card.ID}}" hx-target="closest .bg-white" hx-swap="outerHTML" class="space-y-2">
    <input type="hidden" name="column" value="{{.Column}}">
    <textarea name="title" required rows="2"
      class="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">{{.Card.Title}}</textarea>
    <textarea name="description" rows="3"
      class="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none">{{.Card.Description}}</textarea>
    <div class="flex items-center space-x-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg shadow cursor-pointer">
        Save
      </button>
      <button type="button"
        hx-get="/cards/{{.Card.ID}}?column={{.Column}}"
        hx-target="closest .bg-white"
        hx-swap="outerHTML"
        class="text-gray-500 hover:bg-gray-300 p-1.5 rounded-lg transition cursor-pointer">
        Cancel
      </button>
    </div>
  </form>
</div>
