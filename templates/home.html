<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Oui</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="w-80 bg-gray-200 p-4 rounded-xl shadow-md">
      <h2 class="font-bold text-gray-700 mb-3 px-1">To Do</h2>

      <div id="card-list" class="space-y-2 mb-3">
      </div>

      <div id="form-container">
        <button hx-get="/cards/new" 
          hx-target="#form-container" 
          hx-swap="outerHTML" 
          class="w-full text-left bg-transparent hover:bg-gray-300 text-gray-600 font-medium p-2 rounded-lg transition">
          + Add a card
        </button>
      </div>
    </div>
  </body>
</html>
