<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Oui</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-8 bg-gray-100 min-h-screen">
    {{template "board.html" .}}
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[id^="card-list-"]').forEach(function(el) {
          new Sortable(el, {
            group: 'cards',
            animation: 150,
            ghostClass: 'opacity-50',
            filter: '[data-no-sortable]',
            onEnd: function(evt) {
              var fromCol = evt.from.id.replace('card-list-', '');
              var toCol   = evt.to.id.replace('card-list-', '');
              if (fromCol === toCol) return;
              var cardId = evt.item.dataset.id;
              if (!cardId) return;
              htmx.ajax('PATCH', '/cards/' + cardId + '/move', {
                target: '[data-id="' + cardId + '"]',
                swap: 'outerHTML',
                values: { column: toCol }
              });
            }
          });
        });
      });
    </script>
  </body>
</html>
