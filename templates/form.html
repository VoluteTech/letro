<div id="form-container-{{.Column}}" hx-trigger="restore-form-{{.Column}}" hx-get="/cards/cancel?column={{.Column}}" hx-swap="outerHTML">
  <form hx-post="/cards" hx-target="#card-list-{{.Column}}" hx-swap="beforeend" class="bg-white p-3 rounded-lg shadow-sm space-y-2">
    <input type="hidden" name="column" value="{{.Column}}">
    <input name="title"
      type="text"
      placeholder="Enter a title for this card..."
      required
      class="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
      autofocus />
    <textarea name="description"
      placeholder="Description (optional)..."
      rows="3"
      class="w-full border border-gray-300 rounded p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
    <div class="flex items-center space-x-2">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg shadow cursor-pointer">
        Add card
      </button>
      <button type="button"
        hx-get="/cards/cancel?column={{.Column}}"
        hx-target="#form-container-{{.Column}}"
        hx-swap="outerHTML"
        class="text-gray-500 hover:bg-gray-300 p-1.5 rounded-lg transition cursor-pointer">
        ✕
      </button>
    </div>
  </form>
</div>
