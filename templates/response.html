<div class="bg-white p-3 rounded-lg shadow-sm border border-gray-300 space-y-1.5">
  <h3 class="font-semibold text-gray-800 text-sm">{{.Card.Title}}</h3>
  {{if .Card.Description}}
    <p class="text-gray-500 text-xs leading-relaxed">{{.Card.Description}}</p>
  {{end}}
  <button hx-get="/cards/edit/{{.Card.ID}}?column={{.Column}}"
    hx-target="closest .bg-white"
    hx-swap="outerHTML"
    class="text-xs text-blue-600 hover:text-blue-800 font-medium cursor-pointer">
    Edit
  </button>
</div>
